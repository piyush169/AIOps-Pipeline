# GitHub Actions handles: Linting, Security Scanning, Docker Build
# (Kaggle dataset shows Security Scan Failure & Build Failure dominate on GitHub Actions)

name: AIOps Pipeline — Lint, Security & Build

on:
  push:
    branches: [ "main", "chaos-run-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: "Code Quality — ESLint & Prettier"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Check Formatting (Prettier)
        run: npx prettier --check "src/**/*.js" "tests/**/*.js"

  security:
    name: "Security Scan — Trivy & npm audit"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Scan for Hardcoded Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: "Container Build — Docker"
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t aiops-api:${{ github.sha }} .

      - name: Verify Container Starts
        run: |
          docker run -d --name test-container -p 3000:3000 \
            -e DB_HOST=host.docker.internal \
            -e REDIS_URL=redis://host.docker.internal:6379 \
            aiops-api:${{ github.sha }}
          sleep 3
          docker logs test-container
          docker stop test-container
