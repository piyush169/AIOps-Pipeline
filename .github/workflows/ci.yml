name: AIOps Versatile Pipeline

on:
  push:
    branches: [ "main", "chaos-run-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aiops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm install

    - name: Run Linter
      run: npm run lint
      continue-on-error: false

    - name: Run Security Audit
      run: npm audit
      continue-on-error: false

    - name: Run Tests
      run: npm test
      env:
        DB_HOST: localhost
        REDIS_URL: redis://localhost:6379

    - name: Test Docker Build
      run: docker build -t aiops-api .
